<!DOCTYPE html>
<html>
<head>
    <title>Hello!</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 50px;
            background-color: #f0f8ff;
        }
        .card {
            background: white;
            padding: 40px;
            border-radius: 15px;
            display: inline-block;
            box-shadow: 0 6px 12px rgba(0,0,0,0.1);
            max-width: 500px;
        }
        img {
            border-radius: 50%;
            width: 180px;
            height: 180px;
            object-fit: cover;
            border: 4px solid #9370db;
        }
        h1 {
            color: #4b0082;
            margin-top: 20px;
        }
        .interests {
            background: #f9f4ff;
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
        }
        .contact-btn {
            display: inline-block;
            background: linear-gradient(45deg, #8a2be2, #9370db);
            color: white;
            padding: 12px 30px;
            text-decoration: none;
            border-radius: 25px;
            font-weight: bold;
            margin-top: 15px;
            transition: transform 0.3s;
        }
        .contact-btn:hover {
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <div class="card">
        <!-- фото -->
        <img src="https://media.discordapp.net/attachments/1036655493973811271/1483768998964363324/f8ec022177dbeb9d40019b92a2e162c7.jpg?ex=69bbcb10&is=69ba7990&hm=11e36146d6f619722a96fc868c69ec9fd3c64c53f5e61ed4178744e964f47d82&=&format=webp&width=634&height=873" alt="Aln's Photo">
        
        <h1>Hello! I'm Alena </h1>
        
        <div class="interests">
            <h3> My Passions:</h3>
            <p>• Music </p>
            <p>• Gaming </p>
            <p>• Cybersecurity & Hacking</p>
        </div>
        
        <p>Currently learning: HTML, CSS, Python </p>
        <p>Next goal: Learn JavaScript and C++</p>
        
        <a href="https://github.com/fevourss" class="contact-btn">GitHub</a>
        <br>
        <p style="margin-top: 25px; color: #666; font-size: 0.9em;">
        </p>
    </div>
</body>
</html>
